<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./queue.css" />
  </head>

  <body>
    <div id="build-container">
      <div id="build-options">
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
        <div
          class="build-option"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="build-options-add">+</div>
        </div>
      </div>
      <div id="builder-queue-view">
        <div
          class="queue-item"
          style="background-image: url(https://gpen.innogamescdn.com/images/game/main/lumber.png)"
        >
          <div class="up">+1</div>
          <div class="cancel">&#x2715;</div>
        </div>
      </div>
      <div id="builder-provider-cities-section">
        <div class="input-wrapper" style="display: flex; gap: 8px; align-items: center">
          <label for="supplier-cities-auto">Supplier cities</label>
          <label class="toggle-switch">
            <input type="checkbox" id="builder-supplier-cities-auto" checked />
            <span class="toggle-slider"></span>
          </label>
          <span id="builder-supplier-cities-auto-text" class="auto-value">auto</span>
          <select name="builder-provider-cities" id="builder-provider-cities" class="hidden"></select>
        </div>
        <div class="input-wrapper" style="display: flex; gap: 8px; align-items: center">
          <label for="max-shipment-time">Max shipment time</label>
          <select name="max-shipment-time" id="max-shipment-time">
            <option value="600000">10 min</option>
            <option value="900000">15 min</option>
            <option value="1200000">20 min</option>
            <option selected value="1500000">25 min</option>
            <option value="1800000">30 min</option>
            <option value="2100000">35 min</option>
            <option value="2400000">40 min</option>
          </select>
        </div>
        <div class="input-wrapper" style="display: flex; gap: 8px; align-items: center">
          <label for="builder-priority">Priority</label>
          <select name="builder-priority" id="builder-priority">
            <option value="normal">Normal</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="input-wrapper" style="display: flex; gap: 8px; align-items: center">
          <label for="builder-blocking">Blocking</label>
          <select name="builder-blocking" id="builder-blocking">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </div>
      </div>
      <div id="builder-navigation"></div>
    </div>
    <button id="toggle-builder">Toggle builder</button>
  </body>
  <script>
    const supplierCitiesCheckbox = document.getElementById('supplier-cities-auto');
    const supplierCitiesAutoText = document.getElementById('supplier-cities-auto-text');
    const supplierCitiesSelect = document.getElementById('builder-provider-cities');

    supplierCitiesCheckbox.addEventListener('change', function () {
      if (this.checked) {
        supplierCitiesAutoText.classList.remove('hidden');
        supplierCitiesSelect.classList.add('hidden');
      } else {
        supplierCitiesAutoText.classList.add('hidden');
        supplierCitiesSelect.classList.remove('hidden');
      }
    });
  </script>
</html>
