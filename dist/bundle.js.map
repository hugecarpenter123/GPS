export default "<div id=\"build-container\" class=\"hidden\">\r\n  <div id=\"build-options\">\r\n  </div>\r\n  <div id=\"additional-queue\">\r\n\r\n  </div>\r\n  <div id=\"provider-cities-section\">\r\n    <div class=\"input-wrapper\" style=\"display: flex; gap: 8px; align-items: center;\">\r\n      <label for=\"provider-cities\">Supplier cities</label>\r\n      <select name=\"provider-cities\" id=\"provider-cities\">\r\n      </select>\r\n    </div>\r\n    <div class=\"input-wrapper\" style=\"display: flex; gap: 8px; align-items: center;\">\r\n      <label for=\"max-shipment-time\">Max shipment time</label>\r\n      <select name=\"max-shipment-time\" id=\"max-shipment-time\">\r\n        <option value=\"600000\">10 min</option>\r\n        <option value=\"900000\">15 min</option>\r\n        <option value=\"1200000\">20 min</option>\r\n        <option selected value=\"1500000\">25 min</option>\r\n        <option value=\"1800000\">30 min</option>\r\n        <option value=\"2100000\">35 min</option>\r\n        <option value=\"2400000\">40 min</option>\r\n        <option value=\"2700000\">45 min</option>\r\n        <option value=\"3000000\">50 min</option>\r\n        <option value=\"3300000\">55 min</option>\r\n        <option value=\"3600000\">60 min</option>\r\n      </select>\r\n    </div>\r\n  </div>\r\n  <div id=\"builder-navigation\"></div>\r\n</div>\r\n<button id=\"toggle-builder\" class=\"hidden\">Toggle builder</button>";
